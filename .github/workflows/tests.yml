name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Slim install — only what the test suite needs.
          # Heavyweight extras (Streamlit, Playwright, Plotly) are excluded
          # because no test imports them.
          pip install \
            "pandas>=2.0" \
            "numpy>=1.24" \
            "scikit-learn>=1.3" \
            "joblib>=1.3" \
            "pytest>=7.0"

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Report failure
        if: failure()
        run: |
          echo "::error::pytest failed. See the step above for the failing test(s)."
