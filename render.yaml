services:
  - type: web
    name: orange-price-predictor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: streamlit run dashboard.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
